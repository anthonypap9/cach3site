<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="public, max-age=31536000">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <link rel="manifest" href="manifest.json">
    <title>Creative Portfolio</title>
    <link rel="stylesheet" href="styles.css?v=1.0.0">
    <!-- Optimized font loading with proper cache busting -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap&v=1.0.0" rel="stylesheet">
    
    <!-- Self-hosted Font Awesome to avoid external cache issues -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css?v=1.0.0">
</head>
<body>

    <!-- Back Arrow -->
    <div class="back-arrow" id="backArrow">
        <a href="#" onclick="goToMain()">
            <i class="fas fa-arrow-left"></i>
        </a>
    </div>

    <!-- Theme Switcher -->
    <div class="theme-switcher">
        <div class="theme-circle theme-1 active" data-theme="default" title="Default Theme"></div>
        <div class="theme-circle theme-2" data-theme="dark" title="Dark Theme"></div>
        <div class="theme-circle theme-3" data-theme="deathwishII" title="Death Wish II Theme"></div>
        <div class="theme-circle theme-4" data-theme="blue" title="Blue Theme"></div>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Hero Section -->
        <section class="hero">
            <div class="hero-content">
                <!-- Option 1: Theme-specific logos -->
                <div class="site-logo">
                    <img src="images/logo-default.png" alt="Your Logo" class="logo-image logo-default" loading="eager">
                    <img src="images/logo-dark.png" alt="Your Logo" class="logo-image logo-dark" loading="eager">
                    <img src="images/logo-deathwishII.png" alt="Your Logo" class="logo-image logo-deathwishII" loading="eager">
                    <img src="images/logo-blue.png" alt="Your Logo" class="logo-image logo-blue" loading="eager">
                </div>
                <!-- Option 2: Keep text title (comment out the logo div above if using this) -->
                <!-- <h1 class="site-title">Your Name</h1> -->
                <p class="site-subtitle">I create.</p>
            </div>
        </section>

        <!-- Navigation Menu -->
        <nav class="main-nav">
                <ul class="nav-list">
                    <li><a href="javascript:void(0)" class="nav-link" data-page="music" id="music-link">Music</a></li>
                    <li><a href="javascript:void(0)" class="nav-link" data-page="art" id="art-link">Art</a></li>
                    <li><a href="#links" class="nav-link">Links</a></li>
                    <li><a href="#about" class="nav-link">About</a></li>
                </ul>
        </nav>



        <!-- Links Section -->
        <section id="links" class="content-section">
            <h2 class="section-title">Links</h2>
            <div class="links-content">
                <div class="social-links">
                    <a href="#" class="social-link">YOUTUBE</a>
                    <a href="#" class="social-link">TWITCH</a>
                    <a href="#" class="social-link">TIKTOK</a>
                    <a href="#" class="social-link">TWITTER</a>
                    <a href="#" class="social-link">INSTAGRAM</a>
                    <a href="#" class="social-link">SPOTIFY</a>
                    <a href="#" class="social-link">BANDCAMP</a>
                    <a href="#" class="social-link">SOUNDCLOUD</a>
                </div>
            </div>
        </section>

        <!-- About Section -->
        <section id="about" class="content-section">
            <h2 class="section-title">About</h2>
            <div class="about-content">
                <p>Hard to write things about yourself.</p>
                <p> Text here</p>
                <p>Here's where you can find me</p>
                <div class="about-links">
                    <a href="#" class="about-link">YouTube</a>
                    <a href="#" class="about-link">Twitch</a>
                    <a href="#" class="about-link">Spotify</a>
                    <a href="#" class="about-link">Instagram</a>
                </div>
            </div>
        </section>
    </main>

    <!-- Dynamic Content Container -->
    <div id="dynamic-content" class="dynamic-content" style="display: none;">
        <!-- Music content will be loaded here -->
    </div>

    <!-- Global Music Player -->
    <div class="global-music-player" id="globalMusicPlayer" style="display: none;">
        <div class="player-header">
            <div class="player-info">
                <img src="" alt="Now Playing" class="player-cover" id="globalPlayerCover">
                <div class="player-details">
                    <h4 class="player-title" id="globalPlayerTitle">Select a track to play</h4>
                    <p class="player-artist" id="globalPlayerArtist">Your Name</p>
                </div>
            </div>
            <div class="player-progress">
                <div class="progress-bar">
                    <div class="progress-fill" id="globalProgressFill"></div>
                </div>
                <div class="time-display">
                    <span id="globalCurrentTime">0:00</span>
                    <span id="globalTotalTime">0:00</span>
                </div>
            </div>
            <div class="player-controls">
                <div class="control-group">
                    <div class="volume-control">
                        <input type="range" class="volume-slider" id="globalVolumeSlider" min="0" max="100" value="70">
                        <i class="fas fa-volume-up volume-icon"></i>
                    </div>
                    <button class="control-btn" id="globalPrevBtn"><i class="fas fa-step-backward"></i></button>
                </div>
                <button class="control-btn play-pause-btn" id="globalPlayPauseBtn"><i class="fas fa-play"></i></button>
                <button class="control-btn" id="globalNextBtn"><i class="fas fa-step-forward"></i></button>
            </div>
            <div class="player-actions">
                <button class="action-btn" id="togglePlayerBtn" title="Minimize Player">
                    <i class="fas fa-chevron-down"></i>
                </button>
                <button class="action-btn" id="closePlayerBtn" title="Close Player">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Critical scripts loaded first -->
    <script src="script.js?v=1.0.0"></script>
    <script src="global-music-player.js?v=1.0.0"></script>
    
    <!-- Non-critical SPA navigation loaded after DOM -->
    <script defer src="spa-navigation.js?v=1.0.0"></script>
    
    <!-- Instagram Embed Script -->
    <script async src="//www.instagram.com/embed.js"></script>
    
    <script>
        function goToMain() {
            if (window.spaNavigation) {
                window.spaNavigation.navigateTo('home');
            } else {
                // Fallback if SPA navigation isn't loaded
                window.location.href = 'index.html';
            }
        }
        
        // Register Service Worker for better caching
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('SW registered: ', registration);
                    })
                    .catch(registrationError => {
                        console.log('SW registration failed: ', registrationError);
                    });
            });
        }
    </script>
</body>
</html>
